<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>차란 노래자랑</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ── 기본 리셋 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
    color: #1A1A1A; background: #fff; line-height: 1.5; overflow-x: hidden;
  }
  .charan-promo { width: 100%; min-height: 100vh; position: relative; }
  .screen { display: none; padding: 0 20px 60px; min-height: 100vh; }
  .screen.active { display: block; text-align: center; }

  /* ── 로고 고정 및 크롭 영역 ── */
  .logo-area {
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* 여백 크롭을 위해 넘치는 이미지 숨김 */
    margin-top: 20px;
  }
  .logo-img {
    width: 280px; /* 로고 크기 조절 */
    height: auto;
    object-fit: cover;
    /* 여백이 너무 많을 경우를 대비해 살짝 확대하여 크롭 효과 */
    transform: scale(1.1); 
  }

  /* ── 공통 버튼 ── */
  .btn {
    border: none; border-radius: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn:active { transform: scale(0.96); opacity: 0.9; }

  /* ── 1. 랜딩 화면 ── */
  .visual-mic {
    width: 130px; height: 130px; border-radius: 50%;
    background: #F3EEFF; display: flex; align-items: center; justify-content: center;
    font-size: 60px; margin: 10px auto 30px; border: 2px solid #E0D4FA;
    animation: mic-bounce 2s ease-in-out infinite;
  }
  @keyframes mic-bounce {
    0%, 100% { transform: translateY(0); box-shadow: 0 10px 20px rgba(124,58,237,0.1); }
    50% { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(124,58,237,0.2); }
  }
  .title-text { font-size: 26px; font-weight: 900; margin-bottom: 10px; }
  .title-text span { color: #7C3AED; }
  .sub-text { font-size: 15px; color: #888; margin-bottom: 40px; }
  .btn-start { width: 100%; max-width: 340px; padding: 20px; background: #7C3AED; color: #fff; font-size: 18px; box-shadow: 0 8px 20px rgba(124,58,237,0.3); }

  /* ── 2. 녹음 및 카운트다운 ── */
  .countdown-overlay {
    display: none; position: fixed; inset: 0; background: #fff; z-index: 100;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .countdown-overlay.active { display: flex; }
  .count-num { font-size: 120px; font-weight: 900; color: #7C3AED; animation: pop 0.5s ease-out; }
  @keyframes pop { 0% { transform: scale(2); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .timer-circle {
    width: 160px; height: 160px; border-radius: 50%; border: 5px solid #F3EEFF;
    margin: 30px auto; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .timer-circle::after {
    content: ''; position: absolute; inset: -5px; border-radius: 50%;
    border: 5px solid #7C3AED; border-top-color: transparent; animation: rotate 1s linear infinite;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  .timer-text { font-size: 40px; font-weight: 900; }

  .wave-box { width: 100%; height: 80px; background: #FAFAFA; border-radius: 15px; margin: 20px 0; overflow: hidden; }
  .btn-stop { padding: 16px 50px; background: #FEF2F2; border: 2px solid #FECACA; color: #DC2626; font-size: 16px; }

  /* ── 3. 채점 화면 ── */
  .score-loader { width: 70px; height: 70px; border: 5px solid #F3EEFF; border-top-color: #7C3AED; border-radius: 50%; animation: rotate 0.8s linear infinite; margin: 50px auto 20px; }

  /* ── 4. 결과 화면 (노래방 스타일) ── */
  .result-card {
    background: linear-gradient(145deg, #1a0533, #3b1d7a);
    color: #fff; padding: 40px 20px; border-radius: 0 0 40px 40px; margin: -20px -20px 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .big-score { font-size: 100px; font-weight: 900; text-shadow: 0 0 30px rgba(165,243,252,0.8); margin: 10px 0; }
  .result-ment { font-size: 20px; font-weight: 700; color: #A5F3FC; }
  
  .coupon-box {
    background: #F9F7FE; border: 2px dashed #D0C4F0; padding: 25px; border-radius: 20px; margin-bottom: 30px;
  }
  .coupon-code { font-family: monospace; font-size: 24px; color: #7C3AED; font-weight: 900; margin-top: 10px; display: block; }
  .btn-group { display: flex; gap: 10px; }
  .btn-share { flex: 2; padding: 18px; background: #7C3AED; color: #fff; font-size: 16px; }
  .btn-retry { flex: 1; padding: 18px; background: #fff; border: 1px solid #E0D4FA; color: #7C3AED; font-size: 16px; }
</style>
</head>
