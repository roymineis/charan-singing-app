<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>차란 노래자랑</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ── 기본 디자인 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #fff; text-align: center; color: #1A1A1A; }
  .screen { display: none; padding: 20px; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── 로고 스타일 (SVG) ── */
  .logo-container { width: 280px; margin: 30px auto; }
  .on-dark { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }

  /* ── 컴포넌트 ── */
  .visual-mic { font-size: 80px; margin: 40px 0; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  .btn { width: 100%; max-width: 300px; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 18px; }
  .btn-start { background: #7C3AED; color: #fff; }
  .result-card { background: linear-gradient(145deg, #1e0a3d, #4c2291); color: #fff; padding: 50px 20px; border-radius: 0 0 40px 40px; margin: -20px -20px 30px; }
  .score { font-size: 100px; font-weight: 900; text-shadow: 0 0 20px #A5F3FC; }
</style>
</head>
<body>

<svg id="charanLogo" style="display:none;">
  <symbol id="logo" viewBox="0 0 300 120">
    <text x="50%" y="40" font-family="Arial Black, sans-serif" font-size="28" fill="#7C3AED" text-anchor="middle">차 란</text>
    <text x="50%" y="100" font-family="Arial Black, sans-serif" font-size="55" fill="#7C3AED" text-anchor="middle" stroke="#fff" stroke-width="2">노래자랑</text>
    <circle cx="260" cy="90" r="15" fill="#FBBF24" opacity="0.8" />
    <text x="260" y="96" font-size="16" fill="#fff" text-anchor="middle">♪</text>
  </symbol>
</svg>

<div class="charan-promo">
  <div id="landing" class="screen active">
    <div class="logo-container">
      <svg width="100%" height="100%"><use xlink:href="#logo"/></svg>
    </div>
    <div class="visual-mic">🎤</div>
    <h1>노래 부르고 쿠폰 받자!</h1>
    <p style="color:#888; margin: 15px 0 40px;">AI가 분석하는 실시간 나의 가창력</p>
    <button class="btn btn-start" onclick="next('recording')">노래 시작하기</button>
  </div>

  <div id="recording" class="screen">
    <div class="logo-container">
      <svg width="100%" height="100%"><use xlink:href="#logo"/></svg>
    </div>
    <div style="width:150px; height:150px; border:5px solid #7C3AED; border-radius:50%; margin:50px auto; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold;">
      REC
    </div>
    <button class="btn" style="background:#FEF2F2; color:#DC2626;" onclick="next('result')">노래 끝내기</button>
  </div>

  <div id="result" class="screen" style="padding:0;">
    <div class="result-card">
        <div class="logo-container on-dark">
            <svg width="100%" height="100%"><use xlink:href="#logo" fill="#fff"/></svg>
        </div>
        <p>당신의 점수는?</p>
        <div class="score">98점</div>
    </div>
    <div style="padding:20px;">
        <div style="border:2px dashed #D0C4F0; padding:20px; border-radius:20px; margin-bottom:20px;">
            <p>전상품 15% 할인 쿠폰</p>
            <h3 style="color:#7C3AED; margin-top:10px;">CHARAN-2026</h3>
        </div>
        <button class="btn btn-start" onclick="location.reload()">다시하기</button>
    </div>
  </div>
</div>

<script>
  function next(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
