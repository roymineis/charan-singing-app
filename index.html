<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>차란 노래자랑</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  /* ── 리셋 및 기본 스타일 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
    color: #1A1A1A; background: #fff; line-height: 1.5;
  }
  .charan-promo { width: 100%; min-height: 100vh; position: relative; }
  .screen { display: none; padding: 0 20px 40px; min-height: 100vh; }
  .screen.active { display: block; text-align: center; }
  
  /* ── 로고 영역 (이미지 크롭 및 고정) ── */
  .logo-container {
    width: 220px; height: 80px; 
    margin: 30px auto 20px;
    overflow: hidden; /* 여백 크롭 효과 */
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-img {
    width: 140%; /* 이미지의 여백을 바깥으로 밀어내기 위해 확대 */
    height: 140%;
    object-fit: contain;
  }
  /* 결과 화면용 로고 (어두운 배경 대응) */
  .logo-container.on-dark { background: rgba(255,255,255,0.1); border-radius: 12px; }

  /* ── 공통 컴포넌트 ── */
  .btn {
    border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s; font-family: inherit;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }

  /* ── 1. 랜딩 ── */
  #landing { padding-top: 20px; }
  .landing-visual {
    width: 120px; height: 120px; border-radius: 50%;
    background: #F3EEFF; display: flex; align-items: center; justify-content: center;
    font-size: 50px; margin: 0 auto 24px; border: 2px solid #E0D4FA;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.1); transform: scale(1); }
    50% { box-shadow: 0 0 0 15px rgba(124,58,237,0.05); transform: scale(1.03); }
  }
  .landing-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .landing-title span { color: #7C3AED; }
  .landing-sub { font-size: 14px; color: #888; margin-bottom: 30px; }
  .landing-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 30px; }
  .landing-step { background: #FAFAFA; border: 1px solid #F0F0F0; border-radius: 10px; padding: 10px 2px; }
  .landing-step-icon { font-size: 18px; margin-bottom: 4px; }
  .landing-step-label { font-size: 10px; color: #666; font-weight: 600; }
  .btn-start { width: 100%; max-width: 320px; padding: 18px; background: #7C3AED; color: #fff; font-size: 16px; box-shadow: 0 4px 16px rgba(124,58,237,0.25); }

  /* ── 2. 녹음 ── */
  .rec-visual-container { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; }
  .rec-ring-active { position: absolute; inset: 0; border-radius: 50%; border: 4px solid #7C3AED; border-top-color: transparent; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .rec-timer { font-size: 36px; font-weight: 900; color: #1A1A1A; }
  .speech-box { background: #F9F7FE; border: 1px solid #E0D4FA; border-radius: 12px; padding: 15px; margin-bottom: 20px; min-height: 54px; font-size: 14px; }
  .waveform-container { height: 60px; background: #FAFAFA; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  #waveCanvas { width: 100%; height: 100%; }
  .btn-stop { padding: 14px 40px; background: #FEF2F2; border: 1.5px solid #FECACA; color: #DC2626; font-size: 15px; }

  /* ── 3. 채점 ── */
  .scoring-spinner { width: 60px; height: 60px; border: 4px solid #F0ECF9; border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 40px auto 20px; }
  .scoring-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; opacity: 0.3; transition: 0.3s; justify-content: center; }
  .scoring-item.done { opacity: 1; }

  /* ── 4. 결과 (노래방 스타일) ── */
  .karaoke-score-area {
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 100%);
    padding: 30px 20px; color: #fff; border-radius: 0 0 30px 30px; position: relative;
  }
  .karaoke-big-score { font-size: 90px; font-weight: 900; color: #e0d0ff; text-shadow: 0 0 20px rgba(167,139,250,0.6); }
  .result-detail-area { padding: 30px 20px; }
  .result-breakdown { background: #FAFAFA; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
  .result-row { display: flex; align-items: center; margin-bottom: 12px; }
  .result-row-bar { flex: 1; height: 6px; background: #EEE; margin: 0 12px; border-radius: 3px; overflow: hidden; }
  .result-row-fill { height: 100%; background: #7C3AED; transition: width 1s; }
  .coupon-card { background: #F9F7FE; border: 2px dashed #D0C4F0; border-radius: 15px; padding: 20px; margin-bottom: 25px; }
  .btn-share { background: #7C3AED; color: #fff; padding: 16px; flex: 1; }
  .btn-retry { background: #fff; border: 1px solid #E0D4FA; color: #7C3AED; padding: 16px; flex: 1; }

  /* 카운트다운 오버레이 */
  .countdown-overlay { display: none; position: fixed; inset: 0; background: #fff; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
  .countdown-overlay.active { display: flex; }
  .countdown-num { font-size: 120px; font-weight: 900; color: #7C3AED; }
</style>
</head>
<body>

<div class="charan-promo">
  
  <div id="landing" class="screen active">
    <div class="logo-container">
      <img src="차란노래자랑로고.jpg" alt="차란 노래자랑" class="logo-img">
    </div>
    <div class="landing-visual">🎤</div>
    <h1 class="landing-title">노래 부르고<br><span>쿠폰</span> 받자!</h1>
    <p class="landing-sub">AI가 당신의 노래 실력을 분석합니다</p>
    <div class="landing-steps">
      <div class="landing-step"><div class="landing-step-icon">🎤</div><div class="landing-step-label">부르기</div></div>
      <div class="landing-step"><div class="landing-step-icon">🧠</div><div class="landing-step-label">AI분석</div></div>
      <div class="landing-step"><div class="landing-step-icon">📊</div><div class="landing-step-label">점수</div></div>
      <div class="landing-step"><div class="landing-step-icon">🎫</div><div class="landing-step-label">쿠폰</div></div>
    </div>
    <button class="btn btn-start" onclick="startFlow()">노래 시작하기</button>
  </div>

  <div id="countdown" class="countdown-overlay">
    <div class="logo-container"><img src="차란노래자랑로고.jpg" class="logo-img"></div>
    <div class="countdown-num" id="countNum">3</div>
  </div>

  <div id="recording" class="screen">
    <div class="logo-container">
      <img src="차란노래자랑로고.jpg" class="logo-img">
    </div>
    <div class="rec-visual-container">
      <div class="rec-ring-active"></div>
      <div style="position:absolute; inset:10px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center;">
        <div class="rec-timer" id="recTimer">0:00</div>
      </div>
    </div>
    <div class="speech-box" id="speechBox">노래를 부르면 가사가 분석됩니다...</div>
    <div class="waveform-container"><canvas id="waveCanvas"></canvas></div>
    <button class="btn btn-stop" onclick="stopRecording()">노래 끝내기</button>
  </div>

  <div id="scoring" class="screen">
    <div class="logo-container"><img src="차란노래자랑로고.jpg" class="logo-img"></div>
    <div class="scoring-spinner"></div>
    <h3>AI가 분석 중입니다...</h3>
    <div style="margin-top:20px;">
      <div class="scoring-item" id="si1">🎵 음정 및 박자 측정</div>
      <div class="scoring-item" id="si2">🎼 멜로디 라인 분석</div>
      <div class="scoring-item" id="si3">🎫 쿠폰 생성 중</div>
    </div>
  </div>

  <div id="result" class="screen" style="padding:0;">
    <div id="captureArea">
      <div class="karaoke-score-area">
        <div class="logo-container on-dark">
          <img src="차란노래자랑로고.jpg" class="logo-img">
        </div>
        <p style="font-size:14px; opacity:0.8;">당신의 노래 점수는?</p>
        <div class="karaoke-big-score" id="finalScore">0</div>
        <p id="resultMent" style="font-weight:700; color:#A5F3FC;">놀라운 실력이네요!</p>
      </div>
      <div class="result-detail-area">
        <div class="result-breakdown">
          <div class="result-row"><span>음정</span><div class="result-row-bar"><div class="result-row-fill" style="width:85%"></div></div></div>
          <div class="result-row"><span>박자</span><div class="result-row-bar"><div class="result-row-fill" style="width:78%"></div></div></div>
          <div class="result-row"><span>감성</span><div class="result-row-bar"><div class="result-row-fill" style="width:92%"></div></div></div>
        </div>
        <div class="coupon-card">
          <p style="color:#7C3AED; font-weight:700; font-size:12px;">🎉 축하합니다!</p>
          <h2 style="margin:5px 0;">차란 15% 할인 쿠폰</h2>
          <p style="font-size:13px; color:#666;">쿠폰코드: <strong style="color:#7C3AED;">SINGING2026</strong></p>
        </div>
      </div>
    </div>
    <div style="padding: 20px; display:flex; gap:10px;">
      <button class="btn btn-retry" onclick="location.reload()">다시하기</button>
      <button class="btn btn-share" onclick="share()">공유하기</button>
    </div>
  </div>

</div>

<script>
  let isRecording = false;
  let timer = 0;
  let timerInterval;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startFlow() {
    showScreen('countdown');
    let count = 3;
    const countEl = document.getElementById('countNum');
    const interval = setInterval(() => {
      count--;
      if(count > 0) countEl.innerText = count;
      else {
        clearInterval(interval);
        document.getElementById('countdown').classList.remove('active');
        startRecording();
      }
    }, 1000);
  }

  function startRecording() {
    showScreen('recording');
    isRecording = true;
    timer = 0;
    timerInterval = setInterval(() => {
      timer++;
      let m = Math.floor(timer/60);
      let s = timer%60;
      document.getElementById('recTimer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
      if(timer >= 30) stopRecording();
    }, 1000);
    // 웨이브폼 애니메이션 (시각용)
    drawWave();
  }

  function stopRecording() {
    isRecording = false;
    clearInterval(timerInterval);
    showScreen('scoring');
    
    // 순차적 애니메이션
    setTimeout(() => document.getElementById('si1').classList.add('done'), 800);
    setTimeout(() => document.getElementById('si2').classList.add('done'), 1600);
    setTimeout(() => document.getElementById('si3').classList.add('done'), 2400);
    setTimeout(showResult, 3200);
  }

  function showResult() {
    showScreen('result');
    const score = Math.floor(Math.random() * 21) + 80; // 80~100점 사이
    document.getElementById('finalScore').innerText = score;
    
    if(score > 95) document.getElementById('resultMent').innerText = "가수 데뷔하셔도 되겠어요!";
    else if(score > 85) document.getElementById('resultMent').innerText = "노래방 인싸 등극!";
    else document.getElementById('resultMent').innerText = "즐거운 노래 한마당이었습니다!";
  }

  function drawWave() {
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    function anim() {
      if(!isRecording) return;
      ctx.clearRect(0,0,canvas.width, canvas.height);
      ctx.beginPath();
      ctx.strokeStyle = '#7C3AED';
      ctx.lineWidth = 2;
      for(let i=0; i<canvas.width; i++) {
        ctx.lineTo(i, 30 + Math.sin(i*0.1 + Date.now()*0.01) * 20 * Math.random());
      }
      ctx.stroke();
      requestAnimationFrame(anim);
    }
    anim();
  }

  async function share() {
    const area = document.getElementById('captureArea');
    const canvas = await html2canvas(area);
    const link = document.createElement('a');
    link.download = '차란노래자랑_결과.png';
    link.href = canvas.toDataURL();
    link.click();
  }
</script>
</body>
</html>
